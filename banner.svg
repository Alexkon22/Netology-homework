<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" fill="none" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#94A3B8" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="#F1F5F9"/>
  <rect x="30" y="30" width="1140" height="260" rx="26" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="30" y="30" width="10" height="260" rx="5" fill="url(#accent)"/>

  <g transform="translate(90,105)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#6366F1" letter-spacing="2">НЕТОЛОГИЯ · DEVOPS ENGINEER</text>
    <text x="0" y="58" font-size="46" font-weight="800" fill="#0F172A" letter-spacing="-1.5">Александр Кононенко</text>
    <text x="0" y="98" font-size="18" fill="#64748B">Репозиторий с домашними заданиями 📚</text>
  </g>

  <g transform="translate(980,95)">
    <rect x="0" y="0" width="130" height="130" rx="24" fill="#EEF2FF"/>
    <g transform="translate(65,65)" fill="none" stroke-linecap="round">
      <path d="M -40,-6 L 0,-24 L 40,-6 L 0,12 Z" fill="#818CF8"/>
      <path d="M -22,2 L -22,22 C -22,30 22,30 22,22 L 22,2" stroke="#38BDF8" stroke-width="6"/>
      <line x1="40" y1="-6" x2="40" y2="18" stroke="#6366F1" stroke-width="6"/>
      <circle cx="40" cy="22" r="4" fill="#38BDF8"/>
    </g>
  </g>
</svg>
